{% extends 'layout.html' %}
{% block title %}Modifier Classe{% endblock %}
{% block content %}
<div class="card shadow-sm border-0 p-4">
    <h1 class="h3 mb-4">Modifier la classe</h1>
    <form method="post" class="row g-3">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="col-md-6">
            <label class="form-label">Nom</label>
            <input name="nom" value="{{ classe.nom }}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Niveau</label>
            <input name="niveau" value="{{ classe.niveau }}" class="form-control" required>
        </div>
        <div class="col-md-6">
            <label class="form-label">Effectif</label>
            <input name="effectif" value="{{ classe.effectif }}" type="number" class="form-control" required>
        </div>
        <div class="col-12 mt-3">
            <button class="btn btn-primary">Sauvegarder</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('classes.index') }}">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
