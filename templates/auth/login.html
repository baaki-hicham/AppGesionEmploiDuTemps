<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Connexion - Emploi du Temps</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {font-family: 'Inter', sans-serif; background: #f4f7ff;}
        .login-card {max-width: 420px; margin: 80px auto; border-radius: 1rem; box-shadow: 0 24px 60px rgba(39, 83, 255, .12);}
        .brand {color: #2563EB;}
    </style>
</head>
<body>
<div class="container">
    <div class="card login-card p-4">
        <div class="card-body">
            <div class="text-center mb-4">
                <h2 class="brand">Gestion Emploi du Temps</h2>
                <p class="text-muted">Connectez-vous pour accéder à l'administration</p>
            </div>
            <form method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Mot de passe</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Se connecter</button>
            </form>
            <div class="mt-3 text-center text-muted small">Admin par défaut: admin@ecole.com / Admin2026!</div>
        </div>
    </div>
</div>
</body>
</html>
