{% extends 'layout.html' %}
{% block title %}Ajouter Enseignant{% endblock %}
{% block content %}
<div class="card shadow-sm border-0 p-4">
    <h1 class="h3 mb-4">Ajouter un enseignant</h1>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nom</label>
                <input name="nom" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Prénom</label>
                <input name="prenom" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email</label>
                <input name="email" type="email" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label class="form-label">Téléphone</label>
                <input name="telephone" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Spécialité</label>
                <input name="specialite" class="form-control">
            </div>
            <div class="col-md-6">
                <label class="form-label">Disponibilité</label>
                <input name="disponibilite" class="form-control" placeholder="Ex. Lundi,Mardi">
            </div>
        </div>
        <div class="mt-4">
            <button class="btn btn-primary">Enregistrer</button>
            <a href="{{ url_for('enseignants.index') }}" class="btn btn-outline-secondary">Annuler</a>
        </div>
    </form>
</div>
{% endblock %}
